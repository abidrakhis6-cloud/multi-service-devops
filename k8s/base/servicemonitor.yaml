apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: multiserve-app
  namespace: multiserve
  labels:
    app: multiserve
    release: prometheus
spec:
  selector:
    matchLabels:
      app: multiserve
      component: app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
