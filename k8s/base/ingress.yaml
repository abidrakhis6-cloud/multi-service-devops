apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiserve-ingress
  namespace: multiserve
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - multiserve.app
        - www.multiserve.app
      secretName: multiserve-tls
  rules:
    - host: multiserve.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multiserve-app
                port:
                  number: 80
    - host: www.multiserve.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multiserve-app
                port:
                  number: 80
