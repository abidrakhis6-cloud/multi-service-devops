apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiserve-ingress
spec:
  tls:
    - hosts:
        - staging.multiserve.app
      secretName: multiserve-staging-tls
  rules:
    - host: staging.multiserve.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multiserve-app
                port:
                  number: 80
