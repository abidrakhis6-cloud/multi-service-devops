apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multiserve-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

replicas:
  - name: multiserve-app
    count: 2

images:
  - name: multiserve-app
    newTag: staging

patchesStrategicMerge:
  - deployment-patch.yaml
  - ingress-patch.yaml

configMapGenerator:
  - name: multiserve-config
    behavior: merge
    literals:
      - DEBUG=False
      - ALLOWED_HOSTS="staging.multiserve.app"
