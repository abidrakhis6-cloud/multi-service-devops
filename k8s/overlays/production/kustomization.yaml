apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multiserve-production

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

replicas:
  - name: multiserve-app
    count: 5

images:
  - name: multiserve-app
    newTag: latest

patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml
  - ingress-patch.yaml

configMapGenerator:
  - name: multiserve-config
    behavior: merge
    literals:
      - DEBUG=False
      - ALLOWED_HOSTS="multiserve.app,www.multiserve.app"
