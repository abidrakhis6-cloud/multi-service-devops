apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multiserve-dev

resources:
  - ../../base

namePrefix: dev-
nameSuffix: -v1

commonLabels:
  environment: development

replicas:
  - name: multiserve-app
    count: 1

images:
  - name: multiserve-app
    newTag: develop

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: multiserve-config
    behavior: merge
    literals:
      - DEBUG=True
      - ALLOWED_HOSTS="*"
