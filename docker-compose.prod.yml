# ==========================================
# Docker Compose - PRODUCTION
# multi-serve.fr avec SSL Let's Encrypt
# ==========================================

version: '3.8'

services:
  # ==========================================
  # Nginx avec SSL
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: multiserve_nginx
    hostname: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Certificats SSL
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - multiserve_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Django Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiserve_app
    hostname: app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONUNBUFFERED=1
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - multiserve_network
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application 
             --bind 0.0.0.0:8000 
             --workers 4 
             --worker-class sync
             --worker-connections 1000
             --max-requests 1000
             --max-requests-jitter 50
             --timeout 60
             --keep-alive 5
             --access-logfile -
             --error-logfile -"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: multiserve_db
    hostname: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-multiserve_prod}
      POSTGRES_USER: ${DB_USER:-multiserve}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: unless-stopped
    networks:
      - multiserve_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-multiserve} -d ${DB_NAME:-multiserve_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb  # Pour les opérations DB volumineuses

  # ==========================================
  # Redis Cache & Sessions
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: multiserve_redis
    hostname: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - multiserve_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # Prometheus (Monitoring)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: multiserve_prometheus
    hostname: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - multiserve_network
    depends_on:
      - app

  # ==========================================
  # Grafana (Dashboards)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: multiserve_grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=multi-serve.fr
      - GF_SERVER_ROOT_URL=https://multi-serve.fr/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - multiserve_network
    depends_on:
      - prometheus

  # ==========================================
  # Celery Worker (Async Tasks)
  # ==========================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiserve_celery
    hostname: celery
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - multiserve_network
    command: >
      celery -A config worker 
      --loglevel=info 
      --concurrency=2
      --max-tasks-per-child=100

  # ==========================================
  # Celery Beat (Scheduled Tasks)
  # ==========================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiserve_celery_beat
    hostname: celery-beat
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - celery_beat_data:/app/celerybeat
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - multiserve_network
    command: >
      celery -A config beat 
      --loglevel=info 
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  celery_beat_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  multiserve_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
