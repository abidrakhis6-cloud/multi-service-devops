{% extends 'base.html' %}

{% block title %}Inscription - Glo-Service{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 20px;">
    <h1 style="text-align: center;">📝 Inscription</h1>

    {% if error %}
        <div style="background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form method="post" style="background: var(--surface); padding: 30px; border-radius: 10px; border: 1px solid var(--border-color);">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required placeholder="Choisir un nom d'utilisateur">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="Votre email">
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required placeholder="Mot de passe (min 8 caractères)">
        </div>

        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" name="password2" required placeholder="Répéter le mot de passe">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">S'inscrire</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <p>Déjà inscrit ? <a href="{% url 'login' %}" style="color: var(--primary-color); font-weight: bold;">Se connecter</a></p>
    </div>
</div>
{% endblock %}
