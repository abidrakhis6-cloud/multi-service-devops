{% extends 'base.html' %}

{% block title %}Connexion - MultiServe{% endblock %}

{% block content %}
<style>
.auth-container {
    max-width: 450px;
    margin: 50px auto;
}

.auth-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header i {
    font-size: 60px;
    color: #3b82f6;
    margin-bottom: 15px;
}

.auth-header h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.auth-header p {
    color: #94a3b8;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text);
    font-size: 16px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

.form-group .input-icon {
    position: relative;
}

.form-group .input-icon i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.form-group .input-icon input {
    padding-left: 50px;
}

.auth-btn {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    margin-top: 10px;
}

.auth-footer {
    text-align: center;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid var(--border);
}

.auth-footer p {
    color: #94a3b8;
    margin-bottom: 10px;
}

.auth-footer a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
}

.auth-footer a:hover {
    text-decoration: underline;
}

.social-login {
    margin-top: 25px;
}

.social-login p {
    text-align: center;
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 15px;
    position: relative;
}

.social-login p::before,
.social-login p::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
}

.social-login p::before { left: 0; }
.social-login p::after { right: 0; }

.social-btns {
    display: flex;
    gap: 15px;
}

.social-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.social-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: #3b82f6;
}

.social-btn i {
    font-size: 20px;
}

.social-btn.google i { color: #ea4335; }
.social-btn.facebook i { color: #1877f2; }
.social-btn.apple i { color: #fff; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-circle"></i>
            <h1>Connexion</h1>
            <p>Connectez-vous pour accéder à votre compte</p>
        </div>

        <form method="post" action="/login/">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Adresse email ou nom d'utilisateur</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="text" name="username" placeholder="exemple@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Votre mot de passe" required>
                </div>
            </div>

            <button type="submit" class="btn auth-btn">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>
        </form>

        <div class="social-login">
            <p>Ou continuer avec</p>
            <div class="social-btns">
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>
            </div>
        </div>

        <div class="auth-footer">
            <p>Pas encore de compte ?</p>
            <a href="/register/">Créer un compte gratuitement</a>
        </div>
    </div>
</div>
{% endblock %}
