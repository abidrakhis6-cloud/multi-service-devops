{% extends 'base.html' %}

{% block title %}Inscription - MultiServe{% endblock %}

{% block content %}
<style>
.auth-container {
    max-width: 450px;
    margin: 50px auto;
}

.auth-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header i {
    font-size: 60px;
    color: #3b82f6;
    margin-bottom: 15px;
}

.auth-header h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.auth-header p {
    color: #94a3b8;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text);
    font-size: 16px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

.form-group .input-icon {
    position: relative;
}

.form-group .input-icon i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.form-group .input-icon input {
    padding-left: 50px;
}

.name-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.auth-btn {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    margin-top: 10px;
}

.auth-footer {
    text-align: center;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid var(--border);
}

.auth-footer p {
    color: #94a3b8;
    margin-bottom: 10px;
}

.auth-footer a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
}

.auth-footer a:hover {
    text-decoration: underline;
}

.terms {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
}

.terms input {
    width: auto;
    margin-top: 3px;
}

.terms a {
    color: #3b82f6;
    text-decoration: none;
}
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Créer un compte</h1>
            <p>Rejoignez MultiServe et profitez de nos services</p>
        </div>

        <form method="post" action="/register/">
            {% csrf_token %}
            
            <div class="name-row">
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" name="first_name" placeholder="Jean" required>
                </div>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" name="last_name" placeholder="Dupont" required>
                </div>
            </div>

            <div class="form-group">
                <label>Adresse email</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="jean.dupont@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Téléphone</label>
                <div class="input-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" name="phone" placeholder="06 12 34 56 78" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Minimum 8 caractères" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password_confirm" placeholder="Confirmez votre mot de passe" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">J'accepte les <a href="#">Conditions d'utilisation</a> et la <a href="#">Politique de confidentialité</a></label>
            </div>

            <button type="submit" class="btn auth-btn">
                <i class="fas fa-user-plus"></i> Créer mon compte
            </button>
        </form>

        <div class="auth-footer">
            <p>Déjà un compte ?</p>
            <a href="/login/">Connectez-vous</a>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    let password = document.querySelector('input[name="password"]').value;
    let confirm = document.querySelector('input[name="password_confirm"]').value;
    
    if (password !== confirm) {
        alert('❌ Les mots de passe ne correspondent pas !');
        return;
    }
    
    if (password.length < 8) {
        alert('❌ Le mot de passe doit contenir au moins 8 caractères !');
        return;
    }
    
    alert('✅ Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
    window.location.href = '/login/';
});
</script>
{% endblock %}
