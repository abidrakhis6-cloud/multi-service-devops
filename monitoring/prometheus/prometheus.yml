# ==========================================
# Prometheus Configuration
# MultiServe Monitoring
# ==========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: multiserve
    environment: production

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['host.docker.internal:9093']

# Load rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
# ==========================================
# Mode 1: Docker Compose (local/dev) - static_configs with DNS names
# Mode 2: EKS Kubernetes (production) - kubernetes_sd_configs + ServiceMonitor
# ==========================================
scrape_configs:
  # ==========================================
  # Prometheus Self-Monitoring
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # ==========================================
  # EKS Kubernetes Service Discovery (Production)
  # Activé quand Prometheus tourne dans le cluster EKS
  # Les ServiceMonitors (k8s/base/servicemonitor.yaml) définissent les cibles
  # ==========================================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['multiserve']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  - job_name: 'kubernetes-services'
    kubernetes_sd_configs:
      - role: service
        namespaces:
          names: ['multiserve']
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true

  # ==========================================
  # Docker Compose Mode (Local Development)
  # Ces cibles ne fonctionnent que dans docker-compose
  # ==========================================
  - job_name: 'django-app'
    static_configs:
      - targets: ['multiserve_app:8000']
    scrape_interval: 15s
    metrics_path: /metrics
    # Uncomment if authentication is required
    # basic_auth:
    #   username: prometheus
    #   password: secret

  # ==========================================
  # Node Exporter (System Metrics)
  # ==========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['multiserve_node_exporter:9100']
    scrape_interval: 15s
    metrics_path: /metrics

  # ==========================================
  # PostgreSQL Exporter
  # ==========================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['multiserve_postgres_exporter:9187']
    scrape_interval: 15s
    metrics_path: /metrics

  # ==========================================
  # Redis Exporter
  # ==========================================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['multiserve_redis_exporter:9121']
    scrape_interval: 15s
    metrics_path: /metrics

  # ==========================================
  # Nginx Exporter (if enabled)
  # ==========================================
  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['multiserve_nginx:9113']
    scrape_interval: 15s
    metrics_path: /metrics

