# ==========================================
# Alertmanager Configuration
# MultiServe Alert Routing & Notifications
# ==========================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@multiserve.com'
  smtp_auth_username: '${ALERT_EMAIL}'
  smtp_auth_password: '${ALERT_EMAIL_PASSWORD}'
  smtp_require_tls: true

# Routing tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 3h
    - match:
        team: database
      receiver: 'database-team'
      group_by: ['alertname', 'instance']
    - match:
        team: infrastructure
      receiver: 'infra-team'
      group_by: ['alertname', 'instance']

# Inhibition rules - suppress lower severity when higher is firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://alertmanager-webhook:8080/alerts'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: '${CRITICAL_ALERT_EMAIL}'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        html: |
          <h2>Critical Alert: {{ .GroupLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          <p><b>Severity:</b> {{ .Labels.severity }}</p>
          <p><b>Instance:</b> {{ .Labels.instance }}</p>
          {{ end }}

  - name: 'warning-alerts'
    email_configs:
      - to: '${WARNING_ALERT_EMAIL}'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'

  - name: 'database-team'
    email_configs:
      - to: '${DB_TEAM_EMAIL}'
        headers:
          Subject: '[DB ALERT] {{ .GroupLabels.alertname }}'

  - name: 'infra-team'
    email_configs:
      - to: '${INFRA_TEAM_EMAIL}'
        headers:
          Subject: '[INFRA ALERT] {{ .GroupLabels.alertname }}'
