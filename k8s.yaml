apiVersion: apps/v1
kind: Deployment
metadata:
  name: multisserve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multisserve
  template:
    metadata:
      labels:
        app: multisserve
    spec:
      containers:
        - name: multisserve
          image: multisserve
          imagePullPolicy: Never
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: multisserve-service
spec:
  type: NodePort
  selector:
    app: multisserve
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007