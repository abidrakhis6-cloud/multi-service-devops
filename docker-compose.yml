version: '3.8'

services:
  web:
    build: .
    container_name: multisserve_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: multisserve_db
    environment:
      POSTGRES_DB: multisserve
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    container_name: multisserve_nginx
    ports:
      - "80:80"
    depends_on:
      - web