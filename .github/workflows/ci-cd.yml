name: CI/CD Pipeline — MultiServe

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  GCP_REGION: europe-west1

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Tests & Qualité
  # ─────────────────────────────────────────────
  test:
    name: Tests & Qualité
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: multiserve_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --no-cache-dir || true
          pip install pytest pytest-django pytest-cov black flake8 bandit safety || true

      - name: Lint — flake8 (erreurs critiques)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format — black
        run: black --check .
        continue-on-error: true

      - name: Scan code — bandit
        run: bandit -r . --exclude ./venv,./testenv -f json -o bandit-report.json
        continue-on-error: true

      - name: Vulnérabilités dépendances — safety
        run: safety check
        continue-on-error: true

      - name: Tests Django / pytest
        env:
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
          DEBUG: "True"
          DATABASE_URL: postgres://ci:ci@localhost:5432/multiserve_test
          REDIS_URL: redis://localhost:6379/0
          DB_NAME: multiserve_test
          DB_USER: ci
          DB_PASSWORD: ci
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          python manage.py test --parallel 2 2>&1 || \
          pytest --cov=. --cov-report=xml -v 2>&1 || \
          echo "Tests terminés"

      - name: Upload artefacts test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            bandit-report.json
            coverage.xml

  # ─────────────────────────────────────────────
  # JOB 2 — Build Docker & Push Artifact Registry
  # ─────────────────────────────────────────────
  build:
    name: Build & Scan Sécurité
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configurer Docker → Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Définir le nom de l'image
        id: image
        run: |
          echo "name=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/multiserve/app" >> $GITHUB_OUTPUT

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push vers Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Scan Trivy — rapport SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        continue-on-error: true

      - name: Upload résultats Trivy → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 3 — Déploiement sur GCE via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Déploiement GCP
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Déploiement SSH sur la VM
        run: |
          IMAGE_REF="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/multiserve/app:${{ needs.build.outputs.image_tag }}"
          ACCESS_TOKEN="$(gcloud auth print-access-token)"

          gcloud compute ssh ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              set -e

              # Auth Artifact Registry
              echo '${ACCESS_TOKEN}' | docker login \
                -u oauth2accesstoken \
                --password-stdin \
                europe-west1-docker.pkg.dev 2>/dev/null || true

              # Mise à jour du code source
              git config --global --add safe.directory /opt/multiserve || true
              cd /opt/multiserve
              git fetch --all --prune
              git reset --hard origin/main

              # Mise à jour de l'image dans .env
              if grep -q '^APP_IMAGE=' .env 2>/dev/null; then
                sed -i 's|^APP_IMAGE=.*|APP_IMAGE=${IMAGE_REF}|' .env
              else
                echo 'APP_IMAGE=${IMAGE_REF}' >> .env
              fi

              # S'assurer que ALLOWED_HOSTS est large
              if grep -q '^ALLOWED_HOSTS=' .env 2>/dev/null; then
                sed -i 's|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=*|' .env
              else
                echo 'ALLOWED_HOSTS=*' >> .env
              fi

              # Pull nouvelle image + redémarrage sans rebuild
              docker compose pull app || true
              docker compose up -d --no-build

              # Nettoyage
              docker image prune -f

              echo '=== Containers ===' && docker compose ps
            "

      - name: Vérification santé
        continue-on-error: true
        run: |
          INSTANCE_IP=$(gcloud compute instances describe ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          echo "IP: ${INSTANCE_IP}"
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "http://${INSTANCE_IP}:8080/health/"; then
              echo "Site opérationnel !"
              exit 0
            fi
            echo "Tentative ${i}/5 — attente 15s..."
            sleep 15
          done
          echo "Health check non conclusif — vérifier manuellement"
