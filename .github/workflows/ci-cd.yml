name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multiserve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run migrations
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/multiserve_test
        SECRET_KEY: test-secret-key
        DEBUG: 'True'
      run: |
        python manage.py migrate
        
    - name: Check Django System
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/multiserve_test
        SECRET_KEY: test-secret-key
        DEBUG: 'True'
      run: |
        python manage.py check
        
    - name: Collect static files
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/multiserve_test
        SECRET_KEY: test-secret-key
        DEBUG: 'True'
      run: |
        python manage.py collectstatic --noinput

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t multiserve:${{ github.sha }} .
        
    - name: Test Docker image
      run: |
        docker run --rm multiserve:${{ github.sha }} python --version

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging-multiserve.onrender.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Staging
      run: |
        echo "Deploying to Staging environment..."
        # Add Render deployment command here if needed
        
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://multiserve.onrender.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Production
      run: |
        echo "Deploying to Production environment..."
        # Add Render deployment command here if needed
